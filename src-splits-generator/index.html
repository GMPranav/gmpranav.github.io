<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Previewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            gap: 20px;
            padding: 20px;
            background-color: black;
            color: white;
            color-scheme: dark;
        }

        textarea {
            width: 95%;
            field-sizing: content;
            font-size: 16px;
        }

        .text-container {
            width: 45%;
            height: fit-content;
            overflow-y: auto;
        }

        #preview {
            border: 1px solid #ccc;
            padding: 10px;
        }

        #preview table th {
            text-align: initial;
        }

        #preview table th[align="center"] {
            text-align: center;
        }

        #preview table th[align="right"] {
            text-align: right;
        }
    </style>
</head>

<body>
    <div class="text-container">
        <h2>Source</h2>
        <textarea id="markdown" placeholder="Write Markdown here..."></textarea>
    </div>
    <div class="text-container">
        <h2>Preview</h2>
        <div id="preview"></div>
    </div>

    <script>
        const textarea = document.getElementById("markdown");
        const preview = document.getElementById("preview");

        textarea.addEventListener("input", () => {
            preview.innerHTML = marked.parse(textarea.value.replaceAll(" ", "&#8193;"));
        });

        // Set initial content
        textarea.value = "# Markdown Previewer\n\nUse this special space!";
        preview.innerHTML = marked.parse(textarea.value);
    </script>
</body>

</html>
